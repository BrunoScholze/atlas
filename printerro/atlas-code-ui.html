<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Code</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0A0A;
    --surface:   #111111;
    --border:    #222222;
    --border2:   #2E2E2E;
    --accent:    #FFFFFF;
    --accent-lo: #FFFFFF0D;
    --accent-md: #FFFFFF22;
    --text:      #F0F0F0;
    --muted:     #555555;
    --muted2:    #888888;
    --success:   #666666;
  }

  [data-theme="light"] {
    --bg:        #F7F7F7;
    --surface:   #FFFFFF;
    --border:    #E0E0E0;
    --border2:   #CCCCCC;
    --accent:    #111111;
    --accent-lo: #11111108;
    --accent-md: #11111118;
    --text:      #111111;
    --muted:     #AAAAAA;
    --muted2:    #666666;
    --success:   #888888;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    transition: background .3s, color .3s;
  }

  .app { display: flex; height: 100vh; overflow: hidden; position: relative; }
  .screen { display: none; width: 100%; height: 100%; }
  .screen.active { display: flex; }

  /* THEME TOGGLE */
  .theme-toggle {
    position: fixed; top: 18px; right: 20px; z-index: 100;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 12px 6px 8px;
    cursor: pointer;
    transition: background .25s, border-color .25s, box-shadow .15s;
  }
  .theme-toggle:hover { border-color: var(--border2); }

  .toggle-track {
    width: 32px; height: 18px;
    background: var(--border2); border-radius: 999px;
    position: relative; transition: background .25s; flex-shrink: 0;
  }
  [data-theme="light"] .toggle-track { background: var(--accent); }

  .toggle-thumb {
    width: 12px; height: 12px; background: #fff;
    border-radius: 50%; position: absolute; top: 3px; left: 3px;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  [data-theme="light"] .toggle-thumb { background: #fff; transform: translateX(14px); }

  .toggle-label {
    font-size: 11px; font-weight: 500; color: var(--muted2);
    letter-spacing: .04em; user-select: none; transition: color .25s;
  }

  /* LOGOS */
  .logo-img {
    width: 80px; height: 80px;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    margin-bottom: 20px;
  }
  .logo-img-sm {
    width: 24px; height: 24px;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    opacity: .6;
  }

  /* SCREEN 1 */
  #s1 {
    align-items: center; justify-content: center;
    flex-direction: column; position: relative; overflow: hidden;
  }

  .s1-card {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; width: 320px;
  }
  .s1-brand {
    font-size: 20px; font-weight: 400; letter-spacing: -.2px;
    color: var(--text); margin-bottom: 52px; transition: color .25s;
  }
  .s1-label {
    align-self: flex-start; font-size: 10px; font-weight: 500;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; transition: color .25s;
  }
  .s1-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 14px; padding: 13px 16px; outline: none;
    transition: border-color .2s, background .25s, color .25s;
    margin-bottom: 24px;
  }
  .s1-input::placeholder { color: var(--muted); }
  .s1-input:focus { border-color: var(--border2); }

  .btn-primary {
    width: 100%; background: var(--text); border: none;
    border-radius: 8px; color: var(--bg);
    font-family: inherit; font-size: 14px; font-weight: 500;
    padding: 14px; cursor: pointer; letter-spacing: .01em;
    transition: opacity .15s, transform .1s, background .25s, color .25s;
  }
  .btn-primary:hover { opacity: .82; }
  .btn-primary:active { transform: scale(.98); }

  /* SCREEN 2 */
  #s2 {
    flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px; position: relative; overflow: hidden;
  }

  .s2-inner {
    position: relative; z-index: 1;
    width: 100%; max-width: 500px;
    display: flex; flex-direction: column;
  }
  .s2-header { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
  .s2-title { font-size: 13px; font-weight: 400; color: var(--muted); letter-spacing: .02em; transition: color .25s; }
  .s2-project { font-size: 13px; font-weight: 500; color: var(--muted2); letter-spacing: .02em; }

  .issue-strip {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 13px 16px; margin-bottom: 12px;
    position: relative; overflow: hidden;
    transition: background .25s, border-color .25s;
  }
  .issue-strip::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--border2); border-radius: 8px 0 0 8px;
  }
  .issue-id { font-size: 11px; font-weight: 600; color: var(--muted2); letter-spacing: .05em; white-space: nowrap; }
  .issue-sep { width: 1px; height: 12px; background: var(--border); flex-shrink: 0; }
  .issue-title { font-size: 12.5px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .25s; }
  .issue-badge { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); letter-spacing: .04em; white-space: nowrap; flex-shrink: 0; }
  .issue-badge::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }

  .drop-zone {
    border: 1px dashed var(--border2); border-radius: 8px;
    padding: 24px 20px; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: border-color .2s, background .2s;
    margin-bottom: 12px; position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--muted); background: var(--accent-lo); }
  .drop-zone.attached { border-style: solid; border-color: var(--border2); background: var(--accent-lo); }

  .drop-icon { width: 28px; height: 28px; flex-shrink: 0; color: var(--muted); transition: color .2s; }
  .drop-zone:hover .drop-icon { color: var(--muted2); }
  .drop-text { display: flex; flex-direction: column; gap: 3px; }
  .drop-main { font-size: 13px; color: var(--muted2); transition: color .25s; }
  .drop-main span { color: var(--text); font-weight: 500; }
  .drop-sub { font-size: 11px; color: var(--muted); }

  .float-label {
    position: absolute; top: -8px; left: 12px;
    font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); background: var(--bg); padding: 0 5px;
    transition: color .25s, background .25s; pointer-events: none;
  }

  .attached-file { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text); width: 100%; }
  .attached-file svg { color: var(--muted2); flex-shrink: 0; }
  .attached-file .remove { color: var(--muted); font-size: 11px; margin-left: auto; cursor: pointer; }
  .attached-file .remove:hover { color: var(--text); }

  .field-wrap { position: relative; margin-bottom: 28px; }
  .s2-textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 13px; line-height: 1.65;
    padding: 18px 16px 14px; resize: none; outline: none; min-height: 108px;
    transition: border-color .2s, background .25s, color .25s;
  }
  .s2-textarea::placeholder { color: var(--muted); font-size: 12.5px; }
  .s2-textarea:focus { border-color: var(--border2); }

  .s2-footer { display: flex; align-items: center; justify-content: space-between; }
  .back-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: inherit; font-size: 13px; padding: 11px 20px;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .back-btn:hover { border-color: var(--border2); color: var(--muted2); }
  .btn-go {
    background: var(--text); border: none; border-radius: 8px; color: var(--bg);
    font-family: inherit; font-size: 13px; font-weight: 500; padding: 11px 26px;
    cursor: pointer; letter-spacing: .02em;
    transition: opacity .15s, transform .1s, background .25s, color .25s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-go:hover { opacity: .82; }
  .btn-go:active { transform: scale(.98); }
  .btn-go svg { width: 13px; height: 13px; }
  #fileInput { display: none; }
</style>
</head>
<body>
<div class="app">

  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label" id="themeLabel">Modo claro</span>
  </button>

  <!-- SCREEN 1 -->
  <div id="s1" class="screen active">
    <div class="s1-card">
      <div class="logo-img"></div>
      <div class="s1-brand">Atlas Code</div>
      <div class="s1-label">Projeto alvo</div>
      <input class="s1-input" type="text" placeholder="Ex: APP MINHA PROD" id="projectInput" value="APP MINHA PROD">
      <button class="btn-primary" onclick="goToScreen2()">Iniciar</button>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div id="s2" class="screen">
    <div class="s2-inner">

      <div class="s2-header">
        <div class="logo-img-sm"></div>
        <span class="s2-title">Atlas Code</span>
        <span style="color:var(--border2)">·</span>
        <span class="s2-project" id="s2ProjectName">APP MINHA PROD</span>
      </div>

      <div class="issue-strip">
        <span class="issue-id">DMANUFATURA-21257</span>
        <div class="issue-sep"></div>
        <span class="issue-title">Problema de visualização de botão na hora de informar motivos de refugo</span>
        <span class="issue-badge">Jira</span>
      </div>

      <div class="drop-zone" id="dropZone"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)"
           onclick="document.getElementById('fileInput').click()">
        <span class="float-label">Simulação — opcional</span>
        <div id="dropContent" style="display:flex;align-items:center;gap:14px;width:100%;">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <div class="drop-text">
            <span class="drop-main">Arraste o PDF ou <span>clique para selecionar</span></span>
            <span class="drop-sub">Exportado do Jira · apenas .pdf</span>
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept=".pdf" onchange="handleFileSelect(event)">

      <div class="field-wrap">
        <span class="float-label">Descrição do problema</span>
        <textarea class="s2-textarea"
          placeholder="Ex: Na tela de Apontamento de Produção, ao salvar o registro, o campo Quantidade fica em branco. O valor deveria ser mantido após salvar…"
          rows="5"></textarea>
      </div>

      <div class="s2-footer">
        <button class="back-btn" onclick="goToScreen1()">← Voltar</button>
        <button class="btn-go">
          Iniciar análise
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 7h10M8 3l4 4-4 4"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let isDark = true;

  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('themeLabel').textContent = isDark ? 'Modo claro' : 'Modo escuro';
  }

  function goToScreen2() {
    const proj = document.getElementById('projectInput').value.trim() || 'APP MINHA PROD';
    document.getElementById('s2ProjectName').textContent = proj;
    document.getElementById('s1').classList.remove('active');
    document.getElementById('s2').classList.add('active');
  }

  function goToScreen1() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('s1').classList.add('active');
  }

  function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
  function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }

  function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) attachFile(file);
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) attachFile(file);
  }

  function attachFile(file) {
    const zone = document.getElementById('dropZone');
    const content = document.getElementById('dropContent');
    zone.classList.add('attached');
    content.innerHTML = `
      <div class="attached-file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <polyline points="9 12 12 15 15 12"/>
        </svg>
        <span>${file.name}</span>
        <span class="remove" onclick="clearFile(event)">✕ remover</span>
      </div>`;
  }

  function clearFile(e) {
    e.stopPropagation();
    const zone = document.getElementById('dropZone');
    const content = document.getElementById('dropContent');
    zone.classList.remove('attached');
    content.innerHTML = `
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <div class="drop-text">
        <span class="drop-main">Arraste o PDF ou <span>clique para selecionar</span></span>
        <span class="drop-sub">Exportado do Jira · apenas .pdf</span>
      </div>`;
    document.getElementById('fileInput').value = '';
  }
</script>
</body>
</html>
